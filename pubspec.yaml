name: quickit
description: QuickIT - QR & Barcode Generator and Scanner App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR & Barcode
  qr_flutter: ^4.1.0              # QR code rendering
  barcode_widget: ^2.0.3          # 1D/2D barcode rendering
  mobile_scanner: ^4.0.0          # Camera-based QR & barcode scanner

  # Save & Share
  share_plus: ^7.2.1              # Share content
  gal: ^2.3.0                     # Save image to gallery (replaces image_gallery_saver)
  path_provider: ^2.1.1           # Access file paths

  # Customization
  flutter_colorpicker: ^1.0.3     # Color picker dialog

  # Storage
  hive: ^2.2.3                    # Local key-value database
  hive_flutter: ^1.1.0            # Hive Flutter integration

  # Utilities
  uuid: ^4.2.1                    # Generate unique IDs
  permission_handler: ^11.1.0     # Camera & storage permissions
  super_clipboard: ^0.8.6         # Copy image to clipboard (Android + iOS)

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1          # Generate Hive adapters
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true